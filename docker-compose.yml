services:
  # ─── Backend (FastAPI AI Gateway) ──────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@host.docker.internal:5432/mirea
      REDIS_URL: redis://host.docker.internal:6379/0
      ASR_URL: http://localhost:8001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ─── Frontend (nginx serving index.html) ───────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ─── Database ───────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: mirea
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mirea"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Cache ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
