version: "3.9"

services:
  # ─── Backend (FastAPI) ──────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@postgres:5432/mirea
      REDIS_URL: redis://redis:6379/0
      ASR_URL: http://media-service:8010/asr
      IMAGE_GEN_URL: http://media-service:8010/image
      VLM_URL: http://media-service:8010/vlm
      ROUTER_GGUF_PATH: /models/qwen2.5-1.5b-instruct-fp16.gguf
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - C:/Users/PC/Downloads:/models:ro
    restart: unless-stopped

  # ─── Frontend (React + nginx) ───────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ─── Database ───────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: mirea
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mirea"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Cache ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Media service (ASR + TTS) ──────────────────────────────────
  media-service:
    build: ./media-service
    ports:
      - "8010:8010"
    environment:
      TTS_VOICE: ru-RU-SvetlanaNeural
      WHISPER_MODEL: base
    restart: unless-stopped

volumes:
  pgdata:
