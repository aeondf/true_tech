version: "3.9"

services:
  # ─── Backend (FastAPI) ──────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # ─── Frontend (React + nginx) ───────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ─── Database ───────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: mirea
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mirea"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Cache ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Local LLM router ───────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      sh -c "ollama serve & sleep 5 && ollama pull qwen2.5:3b && wait"

  # ─── Media service (ASR + TTS + VLM + Image Gen) ────────────────
  media-service:
    build: ./media-service
    ports:
      - "8010:8010"
    environment:
      OLLAMA_URL: http://ollama:11434
      TTS_VOICE: ru-RU-SvetlanaNeural
      WHISPER_MODEL: base
    depends_on:
      - ollama
    restart: unless-stopped

  # ─── OpenWebUI (альтернативный интерфейс) ───────────────────────
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      OPENAI_API_BASE_URL: http://backend:8000/v1
      OPENAI_API_KEY: dummy
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  ollama_data:
